<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libro de reclamaciones - Griden</title>
  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; }
    .container { max-width:900px; margin:auto; padding:60px 20px; }
    h1 { font-size:34px; }
    p { line-height:1.7; color:#444; }
    form {
      margin-top:30px;
      background:#fff;
      padding:30px;
      border-radius:10px;
    }
    input, textarea {
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:15px;
      border-radius:6px;
      border:1px solid #ccc;
    }
    button {
      background:#0a2540;
      color:white;
      padding:12px 20px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="container">

<h1>Libro de reclamaciones</h1>

<p>
Si tienes alguna queja, reclamo o sugerencia, puedes registrarla a través de este formulario.
Tu solicitud será atendida en el menor tiempo posible.
</p>

<form>
  <label>Nombre completo</label>
  <input type="text" required>

  <label>Correo electrónico</label>
  <input type="email" required>

  <label>Detalle de la reclamación</label>
  <textarea rows="5" required></textarea>

  <button type="submit">Enviar</button>
</form>

</div>

</body>
</html>
